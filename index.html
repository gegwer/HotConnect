<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HotConnect | Гоша и будильник</title>
    <meta
      name="description"
      content="Рофл-игра про преподавательницу колледжа Гошу, бой и мини-игры."
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body data-theme="home" data-mode="story">
    <div class="fx-flash" id="fx-flash" aria-hidden="true"></div>

    <main class="app" aria-label="Сюжетная игра">
      <section class="panel story-panel" id="story-panel" aria-live="polite">
        <p class="eyebrow" id="story-tag">Утро</p>
        <h1 class="title" id="story-title">Гоша и будильник</h1>
        <p class="text story-text" id="story-text">
          Гоша, преподавательница колледжа, смотрит на будильник как на личного
          врага.
        </p>

        <div
          class="choices"
          id="story-choices"
          aria-label="Варианты выбора"
          hidden
        ></div>

        <div class="ending" id="story-ending" hidden>
          <p class="ending-text" id="story-ending-text"></p>
          <button class="restart" id="restart-button" type="button">
            Начать заново
          </button>
        </div>
      </section>

      <section class="panel battle-panel" id="battle-panel" hidden>
        <div class="battle-top">
          <div class="battle-headline">
            <p class="eyebrow" id="battle-tag">Бой</p>
            <h2 class="battle-title" id="battle-title">Противник</h2>
          </div>

          <div class="battle-stats">
            <div class="hp-card">
              <div class="stat-label-row">
                <span class="stat-label">Гоша</span>
                <span class="stat-meta" id="battle-player-hp">30 / 30</span>
              </div>
              <div class="hp-bar">
                <div class="hp-fill hp-fill-player" id="battle-player-fill"></div>
              </div>
            </div>

            <div class="hp-card">
              <div class="stat-label-row">
                <span class="stat-label" id="battle-enemy-name">Враг</span>
                <span class="stat-meta" id="battle-enemy-hp">90 / 90</span>
              </div>
              <div class="hp-bar">
                <div class="hp-fill hp-fill-enemy" id="battle-enemy-fill"></div>
              </div>
            </div>
          </div>
        </div>

        <p class="battle-message" id="battle-message">
          ...
        </p>

        <div class="arena-shell">
          <div class="arena" id="battle-arena">
            <div class="arena-grid"></div>
            <div class="projectiles" id="battle-projectiles"></div>
            <div class="soul" id="battle-soul" aria-hidden="true">♥</div>
          </div>
        </div>

        <div class="battle-controls" id="battle-controls">
          <button type="button" data-battle-command="fight">Удар</button>
          <button type="button" data-battle-command="act">Действие</button>
          <button type="button" data-battle-command="item">Предмет</button>
        </div>

        <div class="battle-submenu" id="battle-submenu" hidden></div>

        <div class="battle-timing" id="battle-timing" hidden>
          <p class="battle-timing-label" id="battle-timing-label">
            Попади в зелёную зону
          </p>
          <div class="battle-timing-bar">
            <div class="battle-timing-zone" id="battle-timing-zone"></div>
            <div class="battle-timing-needle" id="battle-timing-needle"></div>
          </div>
          <button
            class="battle-timing-button"
            id="battle-timing-button"
            type="button"
          >
            Стоп
          </button>
        </div>
      </section>

      <section class="panel mini-panel" id="mini-panel" hidden>
        <div class="mini-top">
          <div class="mini-headline">
            <p class="eyebrow" id="mini-tag">Мини-игра</p>
            <h2 class="mini-title" id="mini-title">Испытание</h2>
          </div>
          <div class="mini-meta" id="mini-meta"></div>
        </div>

        <p class="mini-text" id="mini-text">...</p>
        <div class="mini-stage" id="mini-stage"></div>
        <div class="mini-actions">
          <button class="restart" id="mini-surrender" type="button">
            Сдаться
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
